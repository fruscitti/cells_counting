# .github/workflows/build-windows.yml
# Builds a Windows NSIS installer for the Cell Counter PySide6 desktop app.
#
# Trigger: manual only (workflow_dispatch) — enter a version like "v1.0.0".
# Output:  GitHub Release created at that tag with CellCounterInstaller.exe attached.
#          Public download URL: https://github.com/<owner>/<repo>/releases/download/<version>/CellCounterInstaller.exe
#
# IMPORTANT: uses windows-2022 (NOT windows-latest).
#   windows-latest now maps to windows-2025 where NSIS is not installed.
#   NSIS 3.10 is pre-installed on windows-2022.

name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write    # required to create GitHub Releases and upload assets

jobs:
  build:
    runs-on: windows-2022    # CRITICAL: NOT windows-latest (= 2025, no NSIS)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7    # uv is NOT pre-installed on runner images
        with:
          enable-cache: false          # suppress "no requirements*.txt found" warning

      - name: Install Python dependencies
        run: uv pip install --system pyinstaller pillow PySide6 opencv-python pandas numpy
        # --system installs into the system Python so pyinstaller is on PATH

      - name: Build with PyInstaller
        run: pyinstaller releases/windows/cell_counter.spec --distpath releases/dist --workpath releases/build

      - name: Build NSIS installer
        shell: pwsh
        run: |
          cd releases/windows
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

      - name: Create GitHub Release and upload installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Cell Counter ${{ github.event.inputs.version }}
          body: |
            ## Cell Counter ${{ github.event.inputs.version }} — Windows Installer

            **Download and run `CellCounterInstaller.exe`** to install Cell Counter on Windows.

            The installer adds Cell Counter to your Start Menu and Program Files.
            An uninstaller is included (via Windows Settings → Apps).
          files: releases/CellCounterInstaller.exe
          draft: false
          prerelease: false
